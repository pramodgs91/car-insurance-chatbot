# fly.toml app configuration file generated for car-insurance-chatbot on 2026-04-13T22:33:01+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'car-insurance-chatbot'
primary_region = 'sin'

[build]

[env]
  DATA_DIR = "/data"

[[mounts]]
  source = "chatbot_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
